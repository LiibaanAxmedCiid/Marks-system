.message-box {
  margin-top: 20px;
  padding: 15px;
  border-radius: 12px;
  background: #ffffff;
  box-shadow: 0 0 10px rgba(0,0,0,0.2);
  text-align: left;
  border-left: 8px solid rgb(78, 2, 8);
   border-right: 8px solid rgb(46, 31, 255);
  display: none; /* hidden by default */
}

/* Show only when there is content */
.message-box:not(:empty) {
  display: block;
}

/* Optional animation */
.message-box {
  animation: fadeIn 5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.label {
  color: rgb(78, 2, 8);  /* your red color */
  font-weight: bold;
}
